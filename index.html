<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Siswa 7B | 2023/2024</title>
    <!-- Font Google agar lebih modern -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            /* Warna Hijau Islamic yang elegan */
            --islamic-green: #065f46; 
            --light-bg: #f0fdf4;
            --text-main: #1e293b;
            --white: #ffffff;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--light-bg);
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* BAR ATAS (NAVBAR) */
        .navbar {
            background-color: var(--islamic-green);
            color: var(--white);
            padding: 10px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 1000;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        .logo-sekolah {
            width: 45px;
            height: 45px;
            background: rgba(255,255,255,0.2); /* Placeholder jika link kosong */
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .logo-sekolah img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .nama-sekolah {
            flex-grow: 1;
            text-align: center;
            font-weight: 700;
            font-size: 1.1rem;
            letter-spacing: 0.5px;
        }

        /* KONTEN UTAMA */
        .main-content {
            flex: 1;
            padding: 30px 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
        }

        .list-container {
            width: 100%;
            max-width: 600px; /* Lebar optimal di desktop agar tidak terlalu melar */
        }

        .siswa-card {
            background: var(--white);
            margin-bottom: 15px;
            border-radius: 12px;
            border: 1px solid #e2e8f0;
            transition: transform 0.2s;
        }

        .siswa-card:hover {
            transform: translateY(-2px);
        }

        .siswa-header {
            padding: 18px;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-weight: 600;
        }

        .nomor-absen {
            background: var(--islamic-green);
            color: white;
            width: 28px;
            height: 28px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            font-size: 0.85em;
            margin-right: 10px;
        }

        .dropdown-content {
            max-height: 0;
            overflow: hidden;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            background: #f8fafc;
        }

        .dropdown-content.open {
            max-height: 150px;
            padding: 20px;
            border-top: 1px solid #f1f5f9;
        }

        /* BAR BAWAH (FOOTER) */
        .footer {
            background-color: var(--islamic-green);
            color: var(--white);
            text-align: center;
            padding: 15px;
            font-size: 0.85rem;
            font-weight: 400;
        }

        /* Responsivitas untuk Layar Besar/Desktop */
        @media (min-width: 768px) {
            .nama-sekolah { font-size: 1.4rem; }
            .main-content { padding: 50px 20px; }
        }
    </style>
</head>
<body>

    <!-- Bar Atas -->
    <nav class="navbar">
        <div class="logo-sekolah">
            <!-- Ganti 'src' dengan link ImgBB kamu -->
            <img src="https://i.ibb.co.com/Y4ZxHSD0/file-00000000babc72088b498628375647f3.png" alt="Logo">
        </div>
        <div class="nama-sekolah">MTS Miftahussalam</div>
        <div style="width: 45px;"></div> <!-- Penyeimbang agar teks tetap di tengah -->
    </nav>

    <main class="main-content">
        <div style="text-align: center; margin-bottom: 25px;">
            <h2 style="color: var(--islamic-green);">Daftar Siswa Kelas 7B</h2>
            <p style="color: #64748b;">Tahun Ajaran 2023/2024</p>
        </div>

        <div class="list-container" id="list-siswa">
            <!-- JavaScript akan mengisi data di sini -->
        </div>
    </main>

    <!-- Bar Bawah -->
    <footer class="footer">
        &copy; 2026 <strong>Rifqi Asy-Syakur Tadarus</strong> - Web Designer
    </footer>

    <script>
        // Silakan isi list nama sesuai data dari Bu Ari
        const daftarNama = [
            "Aditya Nadian",
            "Alisya",
            "Annisa",
            "Apriansah",
            "Arvan Pratama",
            "Dimas Setiawan",
            "Fahrezi",
            "Fakhri",
            "Fajri Maulana",
            "Fikri Ardiansyah",
            "Firman",
            "Fitri",
            "Irsyad Daffa",
            "Muhammad Hanif Fillah",
            "Muhammad Hafidz Miftahuddin",
            "Ilham Saputra",
            "Jahira",
            "Juandika Kurniawan",
            "Julia",
            "Konita",
            "Lutfiah",
            "Nafis Sulaiman",
            "Nesya",
            "Octa",
            "Raffi Patin Arif",
            "Rahma Denia",
            "Raditya Purnama",
            "Raisha",
            "Rifqi Asy-syakur Tadarus",
            "Shera",
            "Sahrul",
            "Vivi Wulandari",
            "Zulfah"
        ];

        const namaSekolah = "MTs Miftahussalam"; 
        const container = document.getElementById('list-siswa');

        daftarNama.forEach((nama, index) => {
            const card = document.createElement('div');
            card.className = 'siswa-card';
            card.innerHTML = `
                <div class="siswa-header" onclick="toggleDetail(this)">
                    <span><span class="nomor-absen">${index + 1}</span> ${nama}</span>
                    <span style="font-size: 0.8em; opacity: 0.5;">▼</span>
                </div>
                <div class="dropdown-content">
                    <p style="color: var(--islamic-green); font-weight: 700; margin-bottom: 5px;">Halo ${nama}!</p>
                    <p style="color: #64748b; font-size: 0.9em;">Angkatan 2023 dari ${namaSekolah}</p>
                </div>
            `;
            container.appendChild(card);
        });

        function toggleDetail(element) {
            const content = element.nextElementSibling;
            const isOpen = content.classList.contains('open');
            
            // Tutup semua yang lain dulu
            document.querySelectorAll('.dropdown-content').forEach(item => {
                item.classList.remove('open');
            });

            // Buka yang diklik jika sebelumnya tertutup
            if (!isOpen) {
                content.classList.add('open');
            }
        }
    </script>
</body>
</html>
